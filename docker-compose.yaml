services:
  db:
    image: postgres:16-alpine
    container_name: christ_medical_db
    restart: always
    environment:
      POSTGRES_DB: christ_medical
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./conversion/etl/V1__Initial_Schema.sql:/docker-entrypoint-initdb.d/1.sql
      - ./conversion/etl/V2__Inital_Staging_Schema.sql:/docker-entrypoint-initdb.d/2.sql
      - ./conversion/etl/V4__Patients_spiritual.sql:/docker-entrypoint-initdb.d/3.sql
      - ./conversion/etl/V5__Clinical_auxiliary.sql:/docker-entrypoint-initdb.d/4.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d christ_medical"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: WebAPI/Dockerfile
    container_name: christ_medical_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=christ_medical;Username=postgres;Password=password
    ports:
      - "5050:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5050/api
    container_name: christ_medical_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

  # Optional: `docker compose --profile etl run --rm etl-app` to run the ETL once.
  etl-app:
    profiles:
      - etl
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=christ_medical;Username=postgres;Password=password
    volumes:
      - ./conversion/data/02_extracted:/app/data

volumes:
  postgres_data:
