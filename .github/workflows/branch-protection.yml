# Use GitHub branch protection rules to block direct pushes to main. This workflow
# only reminds contributors; it never fails the build (CI is in ci.yml).

name: Branch protection (reminder)

on:
  pull_request:
    branches:
      - main

jobs:
  reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Merge via pull request
        run: |
          echo "Thank you for opening a PR into main."
          echo "Repo policy: prefer squash merge after CI passes (see ci.yml)."
