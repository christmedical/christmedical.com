services:
  db:
    image: postgres:16-alpine
    container_name: christ_medical_db
    restart: always
    environment:
      POSTGRES_DB: christ_medical
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      # This ensures your staging data persists locally
      - postgres_data:/var/lib/postgresql/data
      # Automatically run your schema scripts on first startup
      - ./conversion/etl/V1__Initial_Schema.sql:/docker-entrypoint-initdb.d/1.sql
      - ./conversion/etl/V2__Inital_Staging_Schema.sql:/docker-entrypoint-initdb.d/2.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d christ_medical"]
      interval: 5s
      timeout: 5s
      retries: 5

  etl-app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=christ_medical;Username=postgres;Password=password
    volumes:
      # Mount your extracted CSVs so the ETL can see them
      - ./conversion/data/02_extracted:/app/data

volumes:
  postgres_data: